<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flappy Bird</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Flappy Bird</h1>
        <div class="hud">
            <span>Score: <span id="score">0</span></span>
            <span>Best: <span id="best">0</span></span>
        </div>

        <!--
          Dieses Spiel nutzt NUR Canvas — kein HTML für Spielelemente.
          Der gesamte Hintergrund, Vogel, Rohre und Text werden gezeichnet.
          Das nennt man "Canvas-only Rendering".
        -->
        <canvas id="gameCanvas" width="320" height="480"></canvas>

        <div id="status" class="status">Tippe, klicke oder drücke Leertaste</div>
    </div>

    <script src="game.js"></script>
</body>
</html>
