<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Spiel</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Snake</h1>
        <div class="score-board">
            <span>Score: <span id="score">0</span></span>
            <span>Highscore: <span id="highscore">0</span></span>
        </div>
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        <div id="overlay" class="overlay">
            <div class="overlay-text">
                <h2 id="overlayTitle">Snake</h2>
                <p id="overlayMessage">Drücke Leertaste oder tippe zum Starten</p>
            </div>
        </div>
        <div class="controls">
            <div class="controls-row">
                <button class="ctrl-btn" id="btnUp">&#9650;</button>
            </div>
            <div class="controls-row">
                <button class="ctrl-btn" id="btnLeft">&#9664;</button>
                <button class="ctrl-btn" id="btnDown">&#9660;</button>
                <button class="ctrl-btn" id="btnRight">&#9654;</button>
            </div>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
