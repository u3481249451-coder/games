<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Breakout</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Breakout</h1>

        <div class="hud">
            <!-- HUD = Heads-Up Display — die Info-Leiste während des Spiels -->
            <span>Score: <span id="score">0</span></span>
            <span>Level: <span id="level">1</span></span>
            <span>Leben: <span id="lives">♥♥♥</span></span>
        </div>

        <canvas id="gameCanvas" width="600" height="500"></canvas>

        <div id="status" class="status">Leertaste oder Tippen zum Starten</div>
    </div>

    <script src="game.js"></script>
</body>
</html>
